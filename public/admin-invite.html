<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>

/* Page */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
    color:#e2e8f0;
    padding:40px;
}

/* Titles */
h2{
    margin-bottom:10px;
}

h3{
    margin-top:40px;
}

/* Logout button */
button{
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    cursor:pointer;
    font-weight:500;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 4px 12px rgba(59,130,246,0.5);
}

/* Tables */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    background:#1e293b;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* Header */
thead{
    background:#2563eb;
    color:white;
}

thead th{
    padding:12px;
    text-align:left;
}

/* Rows */
tbody td{
    padding:12px;
    border-bottom:1px solid #334155;
}

tbody tr:hover{
    background:#334155;
}

/* Approve button inside table */
tbody button{
    background:#16a34a;
}

tbody button:hover{
    background:#22c55e;
}
/* Admin header layout */
.admin-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

/* Logout button styling */
.logout-btn{
    padding:8px 16px;
    border:none;
    border-radius:6px;
    background:#ef4444;
    color:white;
    font-weight:500;
    cursor:pointer;
    transition:0.2s;
}

/* Hover */
.logout-btn:hover{
    background:#dc2626;
    transform:translateY(-2px);
    box-shadow:0 4px 10px rgba(239,68,68,0.4);
}
</style>
</head>
<body>
<div class="admin-header">
  <h2>Admin Panel</h2>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<h3>Pending Requests</h3>
<table border="1">
<thead><tr><th>Email</th><th>Dept</th><th>Action</th></tr></thead>
<tbody id="pendingBody"></tbody>
</table>

<h3>Approved Officials</h3>
<table border="1">
<thead><tr><th>Email</th><th>Dept</th><th>Access Key</th></tr></thead>
<tbody id="approvedBody"></tbody>
</table>

<script>
const TOKEN = localStorage.getItem("ADMIN_TOKEN");
if(!TOKEN) window.location.href="admin.html";

function logout(){ localStorage.removeItem("ADMIN_TOKEN"); window.location.href="admin.html"; }

async function fetchTables(){
    const pend = await fetch("/api/admin/requests",{headers:{"Authorization":"Bearer "+TOKEN}});
    const pending = await pend.json();
    const pb = document.getElementById("pendingBody");
    pb.innerHTML="";
    for(const email in pending){
        const r = pending[email];
        const tr = document.createElement("tr");
        tr.innerHTML=`<td>${r.email}</td><td>${r.department}</td>
        <td><button onclick="approve('${r.email}')">Approve</button></td>`;
        pb.appendChild(tr);
    }

    const app = await fetch("/api/admin/approved",{headers:{"Authorization":"Bearer "+TOKEN}});
    const approved = await app.json();
    const ab = document.getElementById("approvedBody");
    ab.innerHTML="";
    for(const email in approved){
        const r = approved[email];
        const tr = document.createElement("tr");
        tr.innerHTML=`<td>${r.email}</td><td>${r.department}</td><td>${r.accessKey}</td>`;
        ab.appendChild(tr);
    }
}
async function approve(email){
    const res = await fetch("/api/admin/approve",{
        method:"POST",
        headers:{
            "Authorization":"Bearer "+TOKEN,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({email})
    });
    const data = await res.json();
    alert("Approved: "+data.accessKey);
    fetchTables();
}
fetchTables();
</script>
</body>
</html>
