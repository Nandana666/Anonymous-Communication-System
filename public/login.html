<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Official Login</title>
<style>

/* ===== Animated Background ===== */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

/* Background animation */
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ===== Login Card ===== */
.login-card{
    width:360px;
    padding:40px 30px;
    border-radius:18px;
    text-align:center;
    backdrop-filter:blur(12px);
    background:rgba(30,41,59,0.85);
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
    color:#e2e8f0;
    animation:fadeIn 0.7s ease;
}

/* Title */
.login-card h2{
    margin-bottom:25px;
    font-weight:600;
}

/* ===== Inputs ===== */
.login-card input{
    width:100%;
    padding:12px;
    margin-bottom:18px;
    border-radius:10px;
    border:1px solid #334155;
    background:#020617;
    color:#e2e8f0;
    font-size:14px;
    transition:0.2s;
}

.login-card input:focus{
    border-color:#3b82f6;
    outline:none;
    box-shadow:0 0 8px rgba(59,130,246,0.7);
}

/* ===== Button ===== */
.login-card button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.25s;
}

.login-card button:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 18px rgba(59,130,246,0.6);
}

/* ===== Message ===== */
.message{
    margin-top:15px;
    font-size:14px;
    font-weight:600;
}

/* ===== Signup Link ===== */
.link{
    margin-top:20px;
    font-size:14px;
}

.link a{
    color:#3b82f6;
    font-weight:600;
    text-decoration:none;
}

.link a:hover{
    text-decoration:underline;
}

/* Fade animation */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>
<body>

<div class="login-card">
  <h2>Official Login</h2>

  <input id="email" placeholder="Official Email">
  <input id="accessKey" placeholder="Access Key">

  <button onclick="login()">Login</button>

  <div class="message" id="msg"></div>

  <div class="link">
    New official? <a href="signup.html">Request Signup / Register here</a>
  </div>
</div>

<script>
async function login(){
  const email = document.getElementById("email").value.trim();
  const accessKey = document.getElementById("accessKey").value.trim();
  const msgEl = document.getElementById("msg");

  if(!email || !accessKey){
    msgEl.innerText = "All fields required";
    msgEl.style.color="red";
    return;
  }

  try{
    const res = await fetch("/api/official/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email, accessKey })
    });
    const data = await res.json();

    if(res.ok){
      localStorage.setItem("JWT_TOKEN", data.token);
      localStorage.setItem("DEPARTMENT", data.department); // ⭐ ADD THIS
      msgEl.innerText="Login successful! Redirecting...";
      msgEl.style.color="green";
      setTimeout(()=>window.location.href="official.html",1000);
    } else {
      msgEl.innerText=data.error || "Login failed";
      msgEl.style.color="red";
    }
  } catch(e){ msgEl.innerText=e.message; msgEl.style.color="red"; }
}
</script>

</body>
</html>
