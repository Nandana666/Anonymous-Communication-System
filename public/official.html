<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Official Chat (True E2EE)</title>
<style>
    body{
    font-family:Arial;
    margin:20px;
    background:#0f172a;
    color:#e2e8f0;
}

h2,h3{
    color:#f1f5f9;
}

.messages{
    border:1px solid #334155;
    height:400px;
    overflow-y:scroll;
    padding:10px;
    margin-bottom:10px;
    background:#1e293b;
    border-radius:8px;
}

input{
    width:70%;
    padding:8px;
    border-radius:6px;
    border:1px solid #334155;
    background:#0f172a;
    color:#e2e8f0;
}

input::placeholder{
    color:#94a3b8;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

.convo-list{
    border:1px solid #334155;
    padding:10px;
    margin-bottom:15px;
    max-height:200px;
    overflow-y:auto;
    background:#1e293b;
    border-radius:8px;
}

.convo-item{
    padding:8px;
    cursor:pointer;
    border-bottom:1px solid #334155;
}

.convo-item:hover{
    background:#334155;
}

label{
    color:#cbd5f5;
}
.logout-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
    font-weight:500;
    float:right;
}

.logout-btn:hover{
    background:#dc2626;
}
.badge{
    background:#ef4444;
    color:white;
    border-radius:50%;
    padding:2px 8px;
    font-size:12px;
    margin-left:6px;
}
</style>
</head>

<body>

<script>
// 🔐 LOGIN PROTECTION
const TOKEN = localStorage.getItem("JWT_TOKEN");
const DEPT  = localStorage.getItem("DEPARTMENT");

if(!TOKEN || !DEPT){
    alert("Session expired. Please login again.");
    window.location.href="login.html";
}
</script>

<h2>Official Chat (True E2EE)</h2>
<button class="logout-btn" onclick="logout()">Logout</button>
<hr>

<h3>Conversations</h3>
<div class="convo-list" id="conversationList"></div>

<h3>Messages</h3>
<div class="messages" id="messages"></div>

<label>Reply Token:</label>
<input id="replyTokenInput" placeholder="Reply token..." />
<br><br>

<input id="msg" placeholder="Reply to citizen..." />
<button onclick="sendMessage()">Send</button>

<script>

let ws;
// 🔊 MESSAGE SOUND
const messageSound = new Audio("https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3");
// 🔓 Unlock audio after first user interaction
document.addEventListener("click", () => {
    messageSound.play().then(()=>{
        messageSound.pause();
        messageSound.currentTime = 0;
    }).catch(()=>{});
},{ once:true });
let departmentPrivateKey;
let departmentPublicKeyHex;
let conversationPublicKeys = {};
let currentReplyToken = null;

// --------------------
// CONNECT WEBSOCKET
// --------------------
const protocol = location.protocol === "https:" ? "wss:" : "ws:";
ws = new WebSocket(`${protocol}//${location.host}/official?token=${TOKEN}&dept=${DEPT}`);

ws.onopen = async () => {

    console.log("Official connected");

    const publicKeyHex = await initDepartmentKey();

    // 🔥 SEND PUBLIC KEY TO SERVER
    ws.send(JSON.stringify({
        type: "departmentPublicKey",
        department: DEPT,
        publicKey: publicKeyHex
    }));
};

// --------------------
// RECEIVE MESSAGE
// --------------------
ws.onmessage = async (e) => {

    const msg = JSON.parse(e.data);

    // Conversation list (WhatsApp style)
    if(msg.type === "conversationList"){
        renderConversationList(msg.conversations);
        return;
    }

    const messagesEl = document.getElementById("messages");

    // History load
if(msg.chatType === "history"){

    const messagesEl = document.getElementById("messages");
    messagesEl.innerHTML = "";

    // Store citizen key from conversation
    if(msg.citizenPublicKey){
        conversationPublicKeys[msg.replyToken] = msg.citizenPublicKey;
    }

    for(const m of msg.messages){

        // Ensure replyToken is attached
        m.replyToken = msg.replyToken;

        // Use stored citizen key if message doesn't include it
        if(!m.citizenPublicKey){
            m.citizenPublicKey = conversationPublicKeys[msg.replyToken];
        }

        let text;

        try{
            text = await decryptMessage(m);
        }catch(err){
            console.log("Decrypt failed:", err);
            text = "[Decryption Failed]";
        }

        messagesEl.innerHTML += `
            <b>${m.from === "citizen" ? "Citizen" : "You"}:</b>
            ${text}
            <br><small>${new Date(m.timestamp).toLocaleTimeString()}</small><br><br>
        `;
    }

    messagesEl.scrollTop = messagesEl.scrollHeight;
    return;
}

    // Live message
    if(msg.chatType === "cto"){
        // 🔊 play notification sound
    messageSound.play().catch(()=>{});
    // Store citizen key
    if(msg.citizenPublicKey){
        conversationPublicKeys[msg.replyToken] = msg.citizenPublicKey;
    }

    // ❗ DO NOT display if this conversation is not open
    if(msg.replyToken !== currentReplyToken){
    console.log("Message belongs to another conversation");

    // 🔄 Request updated conversation list
    ws.send(JSON.stringify({
        type: "refreshConversations"
    }));

    return;
}

    const text = await decryptMessage(msg);

    messagesEl.innerHTML += `
        <b>Citizen:</b>
        ${text}
        <br><small>${new Date(msg.timestamp).toLocaleTimeString()}</small><br><br>
    `;

    messagesEl.scrollTop = messagesEl.scrollHeight;
}

        
};

// --------------------
// SEND MESSAGE
// --------------------
async function sendMessage(){

    const input = document.getElementById("msg");
    const replyToken = document.getElementById("replyTokenInput").value.trim();

    if(!input.value.trim()) return;
    if(!replyToken) return alert("Select conversation first!");

    const citizenPublicKeyHex = conversationPublicKeys[replyToken];
    if(!citizenPublicKeyHex) return alert("No key found for this conversation.");

    const citizenPublicKey = await crypto.subtle.importKey(
        "raw",
        hexToBuffer(citizenPublicKeyHex),
        { name: "ECDH", namedCurve: "P-256" },
        false,
        []
    );

    const sharedSecret = await crypto.subtle.deriveBits(
        { name: "ECDH", public: citizenPublicKey },
        departmentPrivateKey,
        256
    );

    const aesKey = await crypto.subtle.importKey(
        "raw",
        await crypto.subtle.digest("SHA-256", sharedSecret),
        { name: "AES-GCM" },
        false,
        ["encrypt"]
    );

    const iv = crypto.getRandomValues(new Uint8Array(12));

    const encrypted = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        aesKey,
        new TextEncoder().encode(input.value)
    );

    ws.send(JSON.stringify({
    chatType: "otc",
    department: DEPT,
    replyToken,
    ciphertext: bufferToHex(encrypted),
    iv: bufferToHex(iv),
    officialPublicKey: departmentPublicKeyHex,
    timestamp: Date.now()
}));
    const messagesEl = document.getElementById("messages");

messagesEl.innerHTML += `
    <b>You:</b> ${input.value}
    <br><small>${new Date().toLocaleTimeString()}</small><br><br>
`;

messagesEl.scrollTop = messagesEl.scrollHeight;
    input.value="";
}

// --------------------
// DECRYPT MESSAGE
// --------------------
async function decryptMessage(data){

    if(!data.ciphertext) return "[Invalid]";

    const citizenPublicKeyHex =
    data.citizenPublicKey ||
    conversationPublicKeys[data.replyToken];
    if(!citizenPublicKeyHex) return "[Missing Key]";

    const citizenPublicKey = await crypto.subtle.importKey(
        "raw",
        hexToBuffer(citizenPublicKeyHex),
        { name: "ECDH", namedCurve: "P-256" },
        false,
        []
    );

    const sharedSecret = await crypto.subtle.deriveBits(
        { name: "ECDH", public: citizenPublicKey },
        departmentPrivateKey,
        256
    );

    const aesKey = await crypto.subtle.importKey(
        "raw",
        await crypto.subtle.digest("SHA-256", sharedSecret),
        { name: "AES-GCM" },
        false,
        ["decrypt"]
    );

    const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: hexToBuffer(data.iv) },
        aesKey,
        hexToBuffer(data.ciphertext)
    );

    return new TextDecoder().decode(decrypted);
}

// --------------------
// PERSISTENT DEPARTMENT KEY
// --------------------
async function initDepartmentKey(){

    const storedPrivate = localStorage.getItem("DEPT_PRIVATE_KEY_" + DEPT);
    const storedPublic  = localStorage.getItem("DEPT_PUBLIC_KEY_" + DEPT);

    if(storedPrivate && storedPublic){
        try{

            departmentPrivateKey = await crypto.subtle.importKey(
                "pkcs8",
                hexToBuffer(storedPrivate),
                { name: "ECDH", namedCurve: "P-256" },
                false,
                ["deriveBits"]
            );

            departmentPublicKeyHex = storedPublic;

            console.log("Loaded existing department key");

            return storedPublic;

        }catch(err){

            console.error("Key import failed:", err);
            alert("Department key corrupted. Old messages cannot be decrypted.");
            return storedPublic;
        }
    }
     console.log("Generating new department key");
    const keyPair = await crypto.subtle.generateKey(
        { name: "ECDH", namedCurve: "P-256" },
        true,
        ["deriveBits"]
    );

    departmentPrivateKey = keyPair.privateKey;

    const privateRaw = await crypto.subtle.exportKey("pkcs8", keyPair.privateKey);
    const publicRaw  = await crypto.subtle.exportKey("raw", keyPair.publicKey);

    const privateHex = bufferToHex(privateRaw);
    const publicHex  = bufferToHex(publicRaw);

    localStorage.setItem("DEPT_PRIVATE_KEY_" + DEPT, privateHex);
    localStorage.setItem("DEPT_PUBLIC_KEY_" + DEPT, publicHex);

    departmentPublicKeyHex = publicHex;

    return publicHex;
}
// --------------------
// CONVERSATION LIST
// --------------------
function renderConversationList(conversations){

    const listEl = document.getElementById("conversationList");
    listEl.innerHTML = "";

    conversations.sort((a,b) => b.lastMessageTime - a.lastMessageTime);

    conversations.forEach(c => {

        const div = document.createElement("div");
        div.className = "convo-item";

        div.innerHTML = `
    <b>${c.replyToken.substring(0,10)}...</b>
    ${c.unreadCount > 0 ? `<span class="badge">${c.unreadCount}</span>` : ""}
`;

        div.onclick = () => {
            loadConversation(c.replyToken);
        };

        listEl.appendChild(div);
    });
}

// --------------------
// LOAD HISTORY
// --------------------
function loadConversation(replyToken){

    currentReplyToken = replyToken;  

    document.getElementById("replyTokenInput").value = replyToken;
    // remove unread badge
const items = document.querySelectorAll(".convo-item");
items.forEach(i=>{
    if(i.innerText.includes(replyToken.substring(0,10))){
        const badge = i.querySelector(".badge");
        if(badge) badge.remove();
    }
});
    ws.send(JSON.stringify({
        chatType: "loadHistory",
        department: DEPT,
        replyToken
    }));
}

// --------------------
// LOGOUT
// --------------------
function logout(){
    ws.close();
    localStorage.removeItem("JWT_TOKEN");
    localStorage.removeItem("DEPARTMENT");
    window.location.href="login.html";
}

// --------------------
// HELPERS
// --------------------
function bufferToHex(buffer){
    return [...new Uint8Array(buffer)]
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
}

function hexToBuffer(hex){
    const bytes = new Uint8Array(hex.length / 2);
    for(let i = 0; i < bytes.length; i++){
        bytes[i] = parseInt(hex.substr(i*2, 2), 16);
    }
    return bytes;
}

</script>

</body>
</html>
