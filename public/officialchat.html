<!DOCTYPE html>
<html>
<head>
    <title>Citizen → Official Chat (E2EE)</title>
    <style>

/* Page */
body{
    font-family:'Segoe UI',sans-serif;
    margin:0;
    padding:40px;
    background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
    color:#e2e8f0;
}

/* Title */
h2{
    margin-bottom:15px;
}

/* Anonymous ID */
#anonID{
    font-weight:bold;
    color:#22c55e !important;
}

/* Dropdown */
select{
    padding:8px;
    border-radius:6px;
    border:1px solid #334155;
    background:#020617;
    color:white;
}

/* Reply token section */
#replyToken{
    color:#3b82f6;
}

/* Buttons */
button{
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    cursor:pointer;
    font-weight:500;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 4px 10px rgba(59,130,246,0.5);
}

/* Input fields */
input{
    padding:10px;
    border-radius:6px;
    border:1px solid #334155;
    background:#020617;
    color:white;
    outline:none;
}

input:focus{
    border-color:#3b82f6;
}

/* Chat box */
.chat-box{
    border:1px solid #334155;
    height:320px;
    overflow-y:auto;
    padding:10px;
    margin:15px 0;
    background:#1e293b;
    border-radius:8px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* Messages */
.chat-box div{
    background:#334155;
    padding:6px 8px;
    margin-bottom:6px;
    border-radius:6px;
}

/* Send button disabled */
#sendBtn:disabled{
    background:#64748b;
    cursor:not-allowed;
}

/* Section divider */
hr{
    border:none;
    border-top:1px solid #334155;
    margin:20px 0;
}

</style>
</head>
<body>

<h2>Citizen → Official Chat (E2EE)</h2>

<p id="anonID" style="font-weight:bold; color:red;"></p>

<label for="department">Select Department:</label>
<select id="department">
    <option value="Police">Police</option>
    <option value="Cyber">Cyber</option>
    <option value="Fire">Fire</option>
    <option value="Health">Health</option>
</select>

<p>
Reply Token:
<span id="replyToken" style="font-weight:bold;"></span>
<button onclick="copyReplyToken()">Copy</button>
</p>

<hr>

<h3>Check Previous Messages</h3>

<input type="text" id="checkTokenInput"
       placeholder="Enter your Reply Token"
       style="width:300px; padding:5px;">

<button onclick="checkMessages()">Check Messages</button>

<br><br>

<div id="chatBox" class="chat-box"></div>

<input type="text" id="messageInput"
       placeholder="Message the department...">

<button id="sendBtn"
        onclick="sendC2OMessage()"
        disabled>
    Send
</button>

<br><br>

<!-- FILE UPLOAD -->
<input type="file" id="fileInput">
<button onclick="sendFile()">Send File</button>

<script src="officialchat.js" defer></script>

</body>
</html>
