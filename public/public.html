<!DOCTYPE html>
<html>
<head>
    <title>Anonymous Public Chat</title>
    <style>

/* Page */
body{
    font-family:'Segoe UI',sans-serif;
    margin:0;
    padding:40px;
    background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
    color:#e2e8f0;
}

/* Anonymous ID bar */
.id-bar{
    background:#020617;
    color:#22c55e;
    padding:12px;
    text-align:center;
    font-weight:600;
    border-radius:6px;
    margin-bottom:25px;
    box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* Chat title */
h2{
    margin-bottom:10px;
}

/* Chat box */
.chat-box{
    border:1px solid #334155;
    height:320px;
    overflow-y:auto;
    padding:12px;
    margin-bottom:15px;
    background:#1e293b;
    border-radius:8px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* Messages */
.chat-box div{
    padding:6px 8px;
    margin-bottom:6px;
    border-radius:6px;
    background:#334155;
}

/* Input */
input{
    padding:10px;
    width:70%;
    border-radius:6px;
    border:1px solid #334155;
    background:#020617;
    color:white;
    outline:none;
}

input:focus{
    border-color:#3b82f6;
}

/* Button */
button{
    padding:10px 16px;
    border:none;
    border-radius:6px;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    cursor:pointer;
    font-weight:500;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 4px 10px rgba(59,130,246,0.5);
}

</style>
</head>
<body>

    <div class="id-bar">
        Your Anonymous ID: <span id="anonId"></span>
    </div>

    <h2>Public Chat</h2>
    <div id="messages" class="chat-box"></div>
    <input type="text" id="messageInput" placeholder="Type message">
    <button onclick="sendPublicMessage()">Send</button>

    <script src="chat.js"></script>
</body>
</html>
