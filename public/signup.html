<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Official Signup</title>
<style>
/* ===== Page Background ===== */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617,#1e293b);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    color:#e2e8f0;
}

/* Background animation */
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ===== Signup Card ===== */
.signup-card{
    width:360px;
    padding:35px;
    border-radius:15px;
    backdrop-filter: blur(10px);
    background: rgba(30,41,59,0.75);
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
    text-align:center;
    transition:0.3s;
}

.signup-card:hover{
    transform:translateY(-5px);
}

/* ===== Title ===== */
.signup-card h2{
    margin-bottom:20px;
    font-weight:600;
}

/* ===== Inputs ===== */
input,select{
    width:100%;
    padding:11px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #334155;
    background:#020617;
    color:#e2e8f0;
    font-size:14px;
    outline:none;
    transition:0.2s;
}

input:focus,select:focus{
    border-color:#3b82f6;
    box-shadow:0 0 5px #3b82f6;
}

/* ===== Buttons ===== */
button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    font-weight:500;
    transition:0.25s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(59,130,246,0.5);
}

/* ===== Message ===== */
#msg{
    margin-top:10px;
    font-size:14px;
}

/* ===== Popup ===== */
#popup{
    margin-top:20px;
    padding:18px;
    border-radius:10px;
    background:#020617;
    border:1px solid #334155;
    animation: popupFade 0.5s ease;
}

@keyframes popupFade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* ===== Access Key Input ===== */
#accessKey{
    text-align:center;
    font-weight:bold;
    letter-spacing:1px;
}
</style>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="signup-card">
  <h2>Official Signup Request</h2>

  <input id="email" placeholder="Official Email">
  <select id="department">
    <option value="Police">Police</option>
    <option value="Cyber">Cyber</option>
    <option value="Fire">Fire</option>
    <option value="Health">Health</option>
  </select>

  <div>
    <button onclick="requestSignup()">Submit Request</button>
    <button onclick="checkStatus()">Check Approval</button>
  </div>

  <div id="msg"></div>

  <div id="popup" style="display:none;">
    <h3>Approved ✅</h3>
    <p><b>Access Key:</b></p>
    <input id="accessKey" readonly>
    <button onclick="copyKey()">Copy</button>
  </div>
</div>

<script>
//const API = "http://localhost:5000";

async function requestSignup(){
  const email = document.getElementById("email").value;
  const department = document.getElementById("department").value;
  const msg = document.getElementById("msg");

  try{
    const res = await fetch("/api/official/request", {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ email, department })
    });
    const data = await res.json();
    msg.innerText = data.message || data.error;
    msg.style.color = data.message ? "green" : "red";
  }catch(e){ msg.innerText = e.message; msg.style.color="red"; }
}

async function checkStatus(){
  const email = document.getElementById("email").value;
  if(!email) return alert("Enter email!");
  try{
    const res = await fetch("/api/official/status?email=" + email);
    const data = await res.json();
    if (!data.approved) { alert("Not approved yet"); return; }

    document.getElementById("popup").style.display = "block";
    document.getElementById("accessKey").value = data.accessKey;
  }catch(e){ alert(e.message); }
}

function copyKey(){
  const key = document.getElementById("accessKey");
  key.select();
  document.execCommand("copy");
  alert("Access Key Copied!");
}
</script>
</body>
</html>
